name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: grainline_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d grainline_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Database — CI uses local Postgres service container, not the Neon pooler/direct URLs from Vercel
      DATABASE_URL: postgresql://ci:ci@localhost:5432/grainline_ci?sslmode=disable
      DIRECT_URL: postgresql://ci:ci@localhost:5432/grainline_ci?sslmode=disable
      # Clerk auth
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      # Stripe
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      # Cloudflare R2
      CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
      CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      NEXT_PUBLIC_CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_R2_PUBLIC_URL }}
      NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
      CLOUDFLARE_R2_PUBLIC_URLS: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URLS }}
      ALLOWED_R2_PUBLIC_URLS: ${{ secrets.ALLOWED_R2_PUBLIC_URLS }}
      UPLOAD_VERIFICATION_SECRET: ci-upload-verification-secret
      # Upstash Redis
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Shipping
      SHIPPO_API_KEY: ${{ secrets.SHIPPO_API_KEY }}
      SHIPPING_RATE_SECRET: ${{ secrets.SHIPPING_RATE_SECRET }}
      # Email
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
      EMAIL_UNSUBSCRIBE_SECRET: ${{ secrets.EMAIL_UNSUBSCRIBE_SECRET }}
      # AI
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Admin / cron
      ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
      ADMIN_PIN_COOKIE_SECRET: ${{ secrets.ADMIN_PIN_COOKIE_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      HEALTH_CHECK_TOKEN: ci-health-check-token
      EMAIL_OUTBOX_DAILY_LIMIT: "100"
      # Sentry / app
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx prisma generate
      - name: Verify Notification preparation production artifact
        env:
          SAVED_SEARCH_RLS_DEPLOY_PHASE: notification-preparation-reviewed
        run: npm run verify:rls-release-artifact
      - name: Prepare CI runtime policy role
        run: psql "$DIRECT_URL" -f scripts/prepare-ci-rls-runtime-role.sql
      - name: Apply migrations to CI Postgres
        run: npx prisma migrate deploy
      - name: Converge production-style runtime grants after migrations
        run: psql "$DIRECT_URL" -v runtime_role=grainline_app_runtime -v migration_role=ci -f scripts/provision-runtime-db-role.sql
      - name: Verify migration status
        run: npx prisma migrate status
      - name: Audit final runtime grants and RLS catalog
        run: GRANT_AUDIT_DATABASE_URL="$DIRECT_URL" RUNTIME_DB_ROLE=grainline_app_runtime MIGRATION_DB_ROLE=ci npm run audit:db-grants -- --allow-loopback-ci
      - run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Production build
        run: npm run build
